name: nfunayo
description: "Expense tracking app."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.40.0
  intl: ^0.18.0 # Added for date formatting
  logger: ^1.1.0  # Improved logging
  audioplayers: ^6.1.0  # Audio playback
  image_picker: ^0.8.4+8  # Image picker
  shared_preferences: ^2.0.15  # Local storage
  share: ^2.0.4  # Sharing features
  provider: ^6.0.5  # State management

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.10.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/log.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/profile.png
    - assets/images/log.png
    - assets/images/smk.png
    - assets/images/profileuser1.png
