name: nfunayo
description: "Expense tracking app."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.1 <4.0.0" # Ensure compatibility with Dart 3.5.1

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  intl: ^0.19.0
  logger: ^2.4.0
  audioplayers: ^6.1.0
  image_picker: ^1.1.2
  shared_preferences: ^2.0.15
  share: ^2.0.4
  provider: ^6.0.5
  fluttertoast: ^8.2.1
  connectivity_plus: ^6.1.0
  url_launcher: ^6.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/log.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/profile.png
    - assets/images/log.png
    - assets/images/smk.png
    - assets/images/profileuser1.png

 